<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Serial Real-Time Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ececec; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        #value-display { font-size: 64px; font-weight: bold; color: #008080; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .label { color: #666; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        .controls { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; border: none; transition: all 0.2s; }
        #btn-connect { background: #008080; color: white; }
        #btn-connect:hover { background: #006666; }
        #btn-stop { background: #ff4757; color: white; }
        #btn-stop:disabled { background: #ccc; cursor: not-allowed; }
        #btn-quit { background: #2f3542; color: white; }
        .status { font-size: 12px; margin-top: 10px; color: #999; }
        canvas { margin-top: 20px; max-height: 400px; }
    </style>
</head>
<body>

<div class="card">
    <div class="label">Current Reading (Index 1)</div>
    <div id="value-display">0.00</div>
    
    <div class="controls">
        <button id="btn-connect">Connect to Device</button>
        <button id="btn-stop" disabled>Stop Plotting</button>
        <button id="btn-quit" onclick="location.reload()">Quit / Reset</button>
    </div>

    <div class="status" id="conn-status">Status: Disconnected</div>

    <canvas id="realTimeChart"></canvas>
</div>

<script>
    let port;
    let reader;
    let keepReading = true;
    let isPlotting = true;
    const WINDOW_SECONDS = 120; // 2 Minute Fixed Window
    const startTime = Date.now();

    // --- Chart.js Configuration ---
    const ctx = document.getElementById('realTimeChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Serial Data (Index 1)',
                borderColor: '#008080',
                backgroundColor: 'rgba(0, 128, 128, 0.1)',
                borderWidth: 2,
                data: [],
                pointRadius: 0,
                fill: true,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                x: {
                    type: 'linear',
                    position: 'bottom',
                    title: { display: true, text: 'Elapsed Time (seconds)' },
                    grid: { color: '#f0f0f0' }
                },
                y: {
                    beginAtZero: true,
                    suggestedMax: 100,
                    grid: { color: '#f0f0f0' }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    // --- Web Serial Logic ---
    async function initSerial() {
        try {
            // Filter is empty to allow picking any serial device
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            document.getElementById('btn-connect').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            document.getElementById('conn-status').innerText = "Status: Connected to " + (port.getInfo().usbVendorId || "Serial Device");

            readLoop();
        } catch (err) {
            console.error("Serial Error:", err);
            alert("Connection failed. Check permissions or ensure device isn't used by another app.");
        }
    }

    async function readLoop() {
        const textDecoder = new TextDecoderStream();
        const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
        reader = textDecoder.readable.getReader();

        let buffer = "";

        try {
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += value;
                let lines = buffer.split('\n');
                buffer = lines.pop(); // Hold partial line

                for (let line of lines) {
                    if (line.trim() && isPlotting) {
                        processCSV(line.trim());
                    }
                }
            }
        } catch (error) {
            console.error("Read Error:", error);
        } finally {
            reader.releaseLock();
        }
    }

    function processCSV(line) {
        const parts = line.split(',');
        // Targeting the second element (Index 1) per your requirement
        if (parts.length >= 2) {
            const val = parseFloat(parts[1]);
            const elapsed = (Date.now() - startTime) / 1000;

            if (!isNaN(val)) {
                // 1. Update Big Number
                document.getElementById('value-display').innerText = val.toFixed(2);
                
                // 2. Add to Chart
                const data = chart.data.datasets[0].data;
                data.push({ x: elapsed, y: val });

                // 3. Maintain 120s History (Prune old data to save memory)
                const cutoff = elapsed - WINDOW_SECONDS;
                while (data.length > 0 && data[0].x < (cutoff - 10)) {
                    data.shift();
                }

                // 4. Update Fixed 2m Window Axis
                chart.options.scales.x.min = Math.max(0, cutoff);
                chart.options.scales.x.max = elapsed + 1; // Small buffer on right
                
                chart.update('none'); 
            }
        }
    }

    // --- UI Listeners ---
    document.getElementById('btn-connect').addEventListener('click', initSerial);

    document.getElementById('btn-stop').addEventListener('click', function() {
        isPlotting = !isPlotting;
        this.innerText = isPlotting ? "Stop Plotting" : "Resume Plotting";
        this.style.background = isPlotting ? "#ff4757" : "#ffa502";
    });
</script>

</body>
</html>
